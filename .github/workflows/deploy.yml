name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-ssr:
    name: Deploy SSR (Vercel Production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build (SSR)
        run: npm run build
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: npx vercel --prod --token "$VERCEL_TOKEN"
      - name: Skip deploy (secrets not configured)
        if: env.VERCEL_TOKEN == ''
        run: echo "Vercel secrets not configured — skipping deploy"

  deploy-static:
    name: Deploy Static Export (Vercel Alias)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build (Static export)
        run: npm run build:static
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: npx vercel --token "$VERCEL_TOKEN"
      - name: Skip deploy (secrets not configured)
        if: env.VERCEL_TOKEN == ''
        run: echo "Vercel secrets not configured — skipping deploy"
