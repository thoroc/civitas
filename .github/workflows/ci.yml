name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Run unit tests (vitest)
        run: bun run test:unit:run
      - name: Lint
        run: bun run lint
      - name: Markdown lint
        run: bun run lint:md
      - name: Type check
        run: bun run type-check
      - name: Build (SSR)
        run: bun run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-ssr-build
          path: .next

  static-export:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Build (Static Export)
        run: bun run build:static
      - name: Assert headers warning logged
        run: |
          if ! grep -q "STATIC_EXPORT enabled" server.log 2>/dev/null; then
            echo "Warning: expected static export warning not found (non-blocking)";
          fi
      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-export-out
          path: out

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Build (SSR)
        run: bun run build
      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps
      - name: Run E2E Tests (prod server)
        env:
          PLAYWRIGHT_PROD: '1'
          CI: '1'
        run: bunx playwright test --reporter=github
      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
            traces
