fix = true

include = [
    "*.md",
    "docs/**/*.md",
    "src/**/*.md",
    "scripts/**/*.md",
    ".github/*.md",
    ".github/ISSUE_TEMPLATE/**/*.md",
]

exclude = [
    "tiles",
    ".agents",
    ".cache",
    ".claude",
    ".codex",
    ".cursor",
    ".devcontainer",
    ".gemini",
    ".next",
    ".vscode",
    "node_modules",
    "dist",
    "build",
    "coverage",
]

[rules.MD013]
line_length = 200
code_blocks = false
tables = false
headings = false
heading_line_length = 200

[rules.MD029]
style = "ordered"
