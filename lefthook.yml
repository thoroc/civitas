pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: bunx biome check {staged_files} --write
      stage_fixed: true
    type-check:
      glob: '*.{ts,tsx}'
      run: bun run type-check
    markdownlint:
      glob: '*.{md,markdown}'
      run: bunx markdownlint-cli2 {staged_files}
    conventions:
      glob: '*.{ts,tsx}'
      run: bash scripts/check-conventions.sh {staged_files}
